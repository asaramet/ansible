---
# CIS Benchmark 1.3.1 - Configure AppArmor
# 1.3.1.1: Ensure AppArmor packages are installed
# 1.3.1.2: Ensure AppArmor is enabled
# 1.3.1.3: Ensure all AppArmor Profiles are enforcing
# 1.3.1.4: Ensure kernel.apparmor_restrict_unprivileged_unconfined is enabled
#
# Rationale: 
# - Without a Mandatory Access Control system installed only the default Discretionary
#   Access Control system will be available.
# - AppArmor is a security mechanism and disabling it is not recommended.
# - Profiles define what resources applications are able to access.
# - Setting profiles to enforce mode removes unconfined status.
# - Restricts unprivileged unconfined processes from bypassing namespace restrictions.

- name: Configure AppArmor as per CIS 1.3.1
  hosts: hs_netz
  become: true
  gather_facts: false

  tasks:
    # CIS 1.3.1.1 - Ensure AppArmor packages are installed
    - name: Check if apparmor is installed
      ansible.builtin.command: dpkg-query -s apparmor
      register: apparmor_installed
      ignore_errors: yes
      changed_when: false

    - name: Check if apparmor-utils is installed
      ansible.builtin.command: dpkg-query -s apparmor-utils
      register: apparmor_utils_installed
      ignore_errors: yes
      changed_when: false

    - name: Set package installation status
      ansible.builtin.set_fact:
        apparmor_packages_compliant: >-
          {{ apparmor_installed.rc == 0 and apparmor_utils_installed.rc == 0 }}

    - name: Display AppArmor package installation status
      ansible.builtin.debug:
        msg: |
          CIS 1.3.1.1 - AppArmor Packages Installation Check
          ==================================================
          apparmor:        {{ 'INSTALLED' if apparmor_installed.rc == 0 else 'NOT INSTALLED' }}
          apparmor-utils:  {{ 'INSTALLED' if apparmor_utils_installed.rc == 0 else 'NOT INSTALLED' }}
          {% if apparmor_packages_compliant %}
          All required packages are installed
          {% endif %}
          ==================================================

    - name: Assert AppArmor packages are installed
      ansible.builtin.assert:
        that: apparmor_packages_compliant
        fail_msg: |
          CIS 1.3.1.1 FAILED
          Missing packages:
          {% if apparmor_installed.rc != 0 %}
          - apparmor
          {% endif %}
          {% if apparmor_utils_installed.rc != 0 %}
          - apparmor-utils
          {% endif %}
          REMEDIATION:
          Run the following command to install required packages:
          # apt install apparmor apparmor-utils
        success_msg: "CIS 1.3.1.1 - AppArmor packages are installed"

    # CIS 1.3.1.2 - Ensure AppArmor is enabled
    - name: Check if AppArmor is disabled in GRUB config
      ansible.builtin.shell: |
        grep "^\s*linux" /boot/grub/grub.cfg | grep -c "apparmor=0" || true
      register: apparmor_disabled_count
      changed_when: false

    - name: Set AppArmor enabled status
      ansible.builtin.set_fact:
        apparmor_enabled: >-
          {{ apparmor_disabled_count.stdout | int == 0 }}

    - name: Display AppArmor enabled status
      ansible.builtin.debug:
        msg: |
          CIS 1.3.1.2 - AppArmor Enabled Check
          ==================================================
          AppArmor status: {{ 'ENABLED' if apparmor_enabled else 'DISABLED' }}
          ==================================================

    - name: Assert AppArmor is enabled
      ansible.builtin.assert:
        that: apparmor_enabled
        fail_msg: |
          CIS 1.3.1.2 FAILED
          AppArmor is disabled (apparmor=0 found in GRUB config)
          REMEDIATION:
          Edit /etc/default/grub and /etc/default/grub.d files and remove
          apparmor=0 parameters from the GRUB_CMDLINE_LINUX= line
          Run the following commands to update and reboot:
          # update-grub
          # reboot
        success_msg: "CIS 1.3.1.2 - AppArmor is enabled"

    # CIS 1.3.1.3 - Ensure all AppArmor Profiles are enforcing
    - name: Get AppArmor profile status
      ansible.builtin.shell: /usr/sbin/apparmor_status
      register: apparmor_status
      changed_when: false
      ignore_errors: yes

    - name: Display AppArmor profile status
      ansible.builtin.debug:
        msg: |
          CIS 1.3.1.3 - AppArmor Profiles Enforcement Check
          ==================================================
          {% if apparmor_status.rc == 0 %}
          {% for line in apparmor_status.stdout.split('\n') %}
          {% if line | regex_search('profiles are|processes') and not line.startswith('           ') %}
          {{ line }}
          {% endif %}
          {% endfor %}
          {% else %}
          AppArmor status command failed or AppArmor not running
          {% endif %}
          ==================================================

    - name: Assert all AppArmor profiles are enforcing
      ansible.builtin.assert:
        that: >
          apparmor_status.rc == 0 and
          (apparmor_status.stdout | regex_findall('(\d+) profiles are in complain mode\.') | first | default('0') | int == 0) and
          (apparmor_status.stdout | regex_findall('(\d+) profiles are in unconfined mode\.') | first | default('0') | int == 0) and
          (apparmor_status.stdout | regex_findall('(\d+) processes are unconfined\.') | first | default('0') | int == 0)
        fail_msg: |
          CIS 1.3.1.3 FAILED
          Not all AppArmor profiles are in enforce mode
          REMEDIATION:
          Run the following command to set all profiles to enforce mode:
          # aa-enforce /etc/apparmor.d/*
          Note: Any unconfined processes may need to have a profile created
          or activated for them and then be restarted
        success_msg: "CIS 1.3.1.3 - All AppArmor profiles are in enforce mode"

    # CIS 1.3.1.4 - Ensure kernel.apparmor_restrict_unprivileged_unconfined is enabled
    - name: Get sysctl value
      ansible.builtin.command: sysctl kernel.apparmor_restrict_unprivileged_unconfined
      register: sysctl_result
      ignore_errors: yes
      changed_when: false

    - name: Display sysctl status
      ansible.builtin.debug:
        msg: |
          CIS 1.3.1.4 - kernel.apparmor_restrict_unprivileged_unconfined Check
          ==================================================
          {{ sysctl_result.stdout | default('Command failed') }}
          ==================================================

    - name: Assert kernel.apparmor_restrict_unprivileged_unconfined is enabled
      ansible.builtin.assert:
        that: >
          sysctl_result.rc == 0 and
          (sysctl_result.stdout | regex_findall('kernel\.apparmor_restrict_unprivileged_unconfined\s*=\s*(\d+)') | first | default('0') | int == 1)
        fail_msg: |
          CIS 1.3.1.4 FAILED
          kernel.apparmor_restrict_unprivileged_unconfined is not set to 1
          Current value: {{ sysctl_result.stdout | default('NOT SET') }}
          REMEDIATION:
          1. Add to /etc/sysctl.d/60-kernel_sysctl.conf:
             kernel.apparmor_restrict_unprivileged_unconfined = 1
          2. Run: # sysctl -w kernel.apparmor_restrict_unprivileged_unconfined=1
          3. Run: # sysctl --system
        success_msg: "CIS 1.3.1.4 - kernel.apparmor_restrict_unprivileged_unconfined is enabled"