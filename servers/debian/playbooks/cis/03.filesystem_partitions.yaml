---
# CIS Benchmark 1.1.2. - Configure Filesystem Partitions
# Checks that specific directories are on separate partitions or tmpfs,
# with required mount options.
# Rationale: Prevents unauthorized device access, SUID execution, and code execution
# on directories that should not contain user executables.
#
# Directories with separate partitions or tmpfs:
#   /tmp, /dev/shm
#
# Directories with separate partitions:
#   /home, /var, /var/tmp, /var/log, /var/log/audit
#
# Directories requiring nodev, nosuid, noexec:
#   /tmp, /dev/shm, /var/tmp, /var/log, /var/log/audit
#
# Directories requiring nodev, nosuid (no noexec):
#   /home, /var
#
# Note: If /tmp entry exists in /etc/fstab, it takes precedence over systemd unit file.
#       On diskless/iSCSI systems, fstab may not override systemd configuration.
#
# Audit:
#   findmnt -kn [DIR] # Example: findmnt -kn /tmp
#   Expected output: /tmp tmpfs tmpfs rw,nosuid,nodev,noexec
#
# Remediation 1 (for tmpfs):
#   systemctl unmask tmp.mount
#   Edit /etc/fstab: tmpfs /tmp tmpfs defaults,rw,nosuid,nodev,noexec,relatime,size=2G 0 0
#
# Remediation 2 (for separate partitions):
#   Edit /etc/fstab and add required options to the fourth field (mounting options).
#   Example: <device> /var/log <fstype> defaults,rw,nosuid,nodev,noexec,relatime 0 0
#   Then run: mount -o remount /var/log

- name: Check partitions mount configuration per CIS
  hosts: debian
  become: true
  gather_facts: false

  vars:
    # Partitions that must be tmpfs
    tmpfs_partitions:
      - '/tmp'
      - '/dev/shm'

    # Partitions that must exist on separate partitions
    separate_partitions:
      - '/home'
      - '/var'
      - '/var/tmp'
      - '/var/log'
      #- '/var/log/audit'

    # Partitions requiring noexec option (in addition to nodev, nosuid)
    noexec_partitions:
      - '/tmp'
      - '/dev/shm'
      - '/var/tmp'
      - '/var/log'
      #- '/var/log/audit'

  tasks:
    # Step 1: Collect ALL mount data in one pass
    - name: Get mount information for all partitions
      ansible.builtin.shell: "findmnt -kn {{ item }}"
      register: raw_mount_data
      changed_when: false
      failed_when: false
      loop: "{{ tmpfs_partitions + separate_partitions | unique }}"

    # Step 2: Parse into structured data
    # mount_info: mount_point -> options (column 3)
    # mount_fstype: mount_point -> filesystem type (column 2)
    - name: Parse mount data into structured dictionaries
      ansible.builtin.set_fact:
        mount_info: >-
          {{
            raw_mount_data.results
            | map(attribute='stdout')
            | flatten
            | select('match', '.+')
            | map('trim')
            | map('split')
            | items2dict(key_name=0, value_name=3)
          }}
        mount_fstype: >-
          {{
            raw_mount_data.results
            | map(attribute='stdout')
            | flatten
            | select('match', '.+')
            | map('trim')
            | map('split')
            | items2dict(key_name=0, value_name=2)
          }}

    # Step 3: Verify tmpfs partitions (check filesystem type column)
    - name: Assert tmpfs partitions are mounted as tmpfs
      ansible.builtin.assert:
        that: mount_fstype[item] == 'tmpfs'
        fail_msg: |
          {{ item }} is not mounted as tmpfs!
          Current fstype: {{ mount_fstype[item] | default('NOT FOUND') }}
          Add to /etc/fstab: tmpfs {{ item }} tmpfs defaults,rw,nosuid,nodev,noexec,size=2G 0 0
        success_msg: "{{ item }} is correctly mounted as tmpfs"
      loop: "{{ tmpfs_partitions }}"

    # Step 4: Verify all required partitions exist
    - name: Assert all required partitions are mounted
      ansible.builtin.assert:
        that: item in mount_info
        fail_msg: |
          {{ item }} is not mounted or doesn't exist!
          Current fstype: {{ mount_fstype[item] | default('NOT FOUND') }}
          Create a new partition and configure /etc/fstab accordingly.

          Example for disk partition:
          <device> {{ item }} <fstype> defaults,nodev,nosuid,noexec,relatime 0 0

          Example for tmpfs:
          tmpfs {{ item }} tmpfs defaults,rw,nosuid,nodev,noexec,relatime,size=2G 0 0

          Remediation:

          1. Create new partition, e.g. /dev/vdb1, with fdisk /dev/vdb, then mkfs.xfs or mkfs.ext4 /dev/vdb1
          2. Mount new partition to a temporary  mountpoint e.g. mount /dev/vdb1 /mnt
          3. Sync data from current folder, if it exists to the mounted partition, e.g: rsync -azv /home/* /mnt
          4. Verify that all data is present with right permissions e.g ls -la /mnt 
          5. Unmount the new partition. e.g umount /mnt
          6. Remove the data from the original directory, to save space. e.g. rm -Rfv /home/*
          7. Mount new partition to the desired folder. e.g mount /dev/vdb1 /home
          8. Update /etc/fstab with the new mountpoint. e.g

          UUID=7da67e29-d23b-4c57-81e0-80165f648d62       /home   xfs     defaults,rw,nosuid,nodev,relatime       0       0

          NB: blkid will show the partition ID and type
        success_msg: "{{ item }} exists and is mounted"
      loop: "{{ separate_partitions }}"

    # Step 5: Verify nosuid option on all partitions
    - name: Assert nosuid option is set
      ansible.builtin.assert:
        that: "'nosuid' in mount_info[item] | default('')"
        fail_msg: |
          Missing nosuid option on {{ item }}.
          Current options: {{ mount_info[item] | default('NOT FOUND') }}
          Edit /etc/fstab and add nosuid to the mount options for {{ item }}.
          Then run: mount -o remount {{ item }}
        success_msg: "{{ item }} has nosuid option"
      loop: "{{ tmpfs_partitions + separate_partitions | unique }}"

    # Step 6: Verify nodev option on all partitions
    - name: Assert nodev option is set
      ansible.builtin.assert:
        that: "'nodev' in mount_info[item] | default('')"
        fail_msg: |
          Missing nodev option on {{ item }}.
          Current options: {{ mount_info[item] | default('NOT FOUND') }}
          Edit /etc/fstab and add nodev to the mount options for {{ item }}.
          Then run: mount -o remount {{ item }}
        success_msg: "{{ item }} has nodev option"
      loop: "{{ tmpfs_partitions + separate_partitions | unique }}"

    # Step 7: Verify noexec option on strict partitions
    - name: Assert noexec option is set on noexec partitions
      ansible.builtin.assert:
        that: "'noexec' in mount_info[item] | default('')"
        fail_msg: |
          Missing noexec option on {{ item }}.

          Current options: {{ mount_info[item] | default('NOT FOUND') }}

          Edit /etc/fstab and add noexec to the mount options for {{ item }}.

          Example for a tmpfs partition:
          tmpfs {{ item }} tmpfs defaults,rw,nosuid,nodev,noexec,relatime,size=2G 0 0

          Example for a separate partition: 
          UUID=9e25b1ff-7a61-4e16-a984-f787b4ff0113 {{ item }} xfs	defaults,rw,nosuid,nodev,noexec,relatime	0	0

          Then run, for tmpfs partitions:
          systemctl daemon-reload

          For separate partitions:
          mount -o remount {{ item }}
        success_msg: "{{ item }} has noexec option"
      loop: "{{ noexec_partitions }}"
