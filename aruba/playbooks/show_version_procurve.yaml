---
# Show firmware version on old Aruba OS (Procurve) switches.
#
# To run the playbook on multiple hosts simultaneously use '--forks' flag
# ansible-playbook show_version_procurve.yml --forks 50
#
- name: Show firmware version on Procurve/ArubaOS switches
  hosts: procurve
  gather_facts: false
  serial: 0       # Run on all hosts simultaneously
  tasks: 
      - name: Get version
        ansible.netcommon.cli_command:
          command: "show version"
        register: version

      - name: Show version
        ansible.builtin.debug:
          var: version.stdout_lines
