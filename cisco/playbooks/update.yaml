---
# Check if firmware have been updated, by comparing current one on the device with 
# the latest required to be installed
#
# To run the playbook:
# ansible-playbook update.yml
#
# Required inventory variables:
#   firmware: Firmware image string (e.g., "c2960x-universalk9-mz.152-2.E7.bin")
#   previous_firmware_version: Firmware version string to check if the new firmware can be installed
#
- name: "Update devices firmware"
  hosts: cisco
  gather_facts: false
  serial: 1

  tasks: 
      - name: Get current firmware version on the devices
        ansible.netcommon.cli_command:
          command: show version
        register: device_firmware

      - name: Devise should be updated as it has the right firmware to update
        debug:
          msg: "Update the devise as the firmware is {{ previous_firmware_version }}"
        when: previous_firmware_version in device_firmware.stdout

      # ---------------------------------------------------------
      # CATALYST 9500 UPGRADE BLOCK (Install Mode ISSU)
      # ---------------------------------------------------------
      - name: Execute 9500 ISSU Upgrade Process
        block:
          - name: Check if firmware already exists on the filesystem
            ansible.netcommon.cli_command:
              command: "dir {{ filesystem }}:{{ firmware }}"
            register: file_check
            # Fails the playbook early if you forgot to upload the .bin file
            failed_when: "'No such file or directory' in file_check.stdout or 'Error' in file_check.stdout"

          - name: Ensure configuration is saved before upgrade
            ansible.netcommon.cli_command:
              command: "write memory"
            vars:
              ansible_command_timeout: 120

          - name: Run Install Add/Activate/Commit via ISSU
            ansible.netcommon.cli_command:
              command: "install add file {{ filesystem }}:{{ firmware }} activate issu commit"
            vars:
              ansible_command_timeout: 1800
            ignore_errors: true
          
          - name: Wait for the standby supervisor to take over and resume SSH
            ansible.builtin.wait_for_connection:
              # Wait 2 minutes before polling to give the standby sup time to initialize
              delay: 120
              # Allow up to 30 minutes for the switch to become reachable again
              timeout: 1800

          - name: Verify new firmware is active (Optional but recommended)
            ansible.netcommon.cli_command:
              command: "show version"
            register: sh_version

          - name: Display current version
            ansible.builtin.debug:
              msg: "{{ sh_version.stdout_lines[0] }}"

          - name: Auto remove old firmware from flash
            ansible.netcommon.cli_command:
              command: "install remove inactive"
              prompt: 
                # Match a safe substring without any regex special characters
                - "remove the above files"
              answer:
                - "y"
            vars:
              ansible_command_timeout: 120

        when: 
          - previous_firmware_version in device_firmware.stdout
          - inventory_hostname in groups['catalyst_9500']

      # ---------------------------------------------------------
      # CATALYST 4506-E and 2960-X UPGRADE BLOCK (Traditional Boot/Reload)
      # ---------------------------------------------------------
      - name: Execute 4506-E/2960-X Upgrade Process
        block:
          - name: Update boot system variable to new firmware
            ansible.netcommon.cli_config:
              # This cleanly enters config mode and sets the boot statement
              config: "boot system {{ filesystem }}:{{ firmware }}"

          - name: Save configuration to NVRAM
            ansible.netcommon.cli_command:
              command: "write memory"

          - name: Reload the device to boot the new image
            ansible.netcommon.cli_command:
              command: "reload"
              prompt: 
                # Cisco's reload confirmation prompt
                - "Proceed with reload"
              answer:
                - "y"
            # The switch will sever the SSH connection immediately upon reloading
            ignore_errors: true

          - name: Wait for the device to reboot and resume SSH
            ansible.builtin.wait_for_connection:
              # Give the 4506-E 5 minutes (300s) to POST and load the new image before polling
              delay: 300
              # Allow up to 20 minutes (1200s) for it to fully return
              timeout: 1200

          - name: Verify new firmware is active
            ansible.netcommon.cli_command:
              command: "show version"
            register: sh_version

          - name: Display current firmware version
            ansible.builtin.debug:
              msg: "{{ sh_version.stdout_lines[0] }}"

        when: 
          - previous_firmware_version in device_firmware.stdout
          - (inventory_hostname in groups['catalyst_4506es']) or (inventory_hostname in groups['catalyst_2960x'])