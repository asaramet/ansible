---
# Copy Cisco firmware overs SSH
#
# To run the playbook:
# ansible-playbook scp_firmware.yml
#
- name: "SCP devices firmware"
  hosts: cisco
  gather_facts: false
  #serial: 5

  tasks: 
      - name: Check if firmware already exists on the filesystem
        ansible.netcommon.cli_command:
          command: "dir {{ filesystem }}:{{ firmware }}"
        register: file_check
        ignore_errors: true

      - name: Get current firmware version on the devices
        ansible.netcommon.cli_command:
          command: show version
        register: device_firmware

      - name: Copy new firmware to Catalyst devices
        block:
          - name: Native Linux SCP transfer (Bypassing net_put and Parser View)
            ansible.builtin.command: >
              scp {{ playbook_dir }}/../software/{{ firmware }} {{ inventory_hostname }}:{{ filesystem }}:{{ firmware }}
            delegate_to: localhost
        when: 
          - file_check.failed
          - previous_firmware_version in device_firmware.stdout

      # ---------------------------------------------------------
      # 4506-E VSS STANDBY FILE SYNC
      # ---------------------------------------------------------
      - name: Check if firmware exists on 4506-E Standby Chassis
        ansible.netcommon.cli_command:
          command: "dir slavebootflash:{{ firmware }}"
        register: file_check_4506_standby
        ignore_errors: true
        when: inventory_hostname in groups['catalyst_4506es']

#      - name: Stage firmware to 4506-E VSS Standby Chassis
#        ansible.netcommon.cli_command:
#          command: "copy bootflash:{{ firmware }} slavebootflash:{{ firmware }}"
#          prompt: 
#            - "Destination filename"
#          answer:
#            - "\r"
#        vars:
#          ansible_command_timeout: 900
#        when: 
#          - inventory_hostname in groups['catalyst_4506es']
#          - file_check_4506_standby.failed

      - name: Stage firmware to 4506-E VSS Standby Chassis via SCP
        ansible.builtin.command: >
          scp {{ playbook_dir }}/../software/{{ firmware }} {{ inventory_hostname }}:slavebootflash:{{ firmware }}
        delegate_to: localhost
        when: 
          - inventory_hostname in groups['catalyst_4506es']
          - file_check_4506_standby.failed

      # ---------------------------------------------------------
      # 2960-X STACK MEMBER FILE SYNC
      # ---------------------------------------------------------
      - name: Check if firmware exists on 2960-X Stack Members
        ansible.netcommon.cli_command:
          # Loops through flash2:, flash3:, etc.
          command: "dir flash{{ item }}:{{ firmware }}"
        register: file_check_2960_slaves
        ignore_errors: true
        loop: [2, 3, 4, 5, 6, 7, 8]
        when: inventory_hostname in groups['catalyst_2960x']

#      - name: Stage firmware to 2960-X Stack Members
#        ansible.netcommon.cli_command:
#          # item.item refers to the number (2, 3, etc.) from the previous loop
#          command: "copy flash:{{ firmware }} flash{{ item.item }}:{{ firmware }}"
#          prompt: 
#            - "Destination filename"
#          answer:
#            - "\r"
#        vars:
#          ansible_command_timeout: 900
#        ignore_errors: true
#        # We loop over the results generated by the previous 'dir' task
#        loop: "{{ file_check_2960_slaves.results }}"
#        when: 
#          - inventory_hostname in groups['catalyst_2960x']
#          # Only run the copy if the specific flash drive is missing the file
#          # AND the flash drive actually exists (which bypasses errors on smaller stacks)
#          - item.failed

      - name: Stage firmware to 2960-X Stack Members via SCP
        ansible.builtin.command: >
          scp {{ playbook_dir }}/../software/{{ firmware }} {{ inventory_hostname }}:flash{{ item.item }}:{{ firmware }}
        delegate_to: localhost
        ignore_errors: true
        # We loop over the results generated by the previous 'dir' task
        loop: "{{ file_check_2960_slaves.results }}"
        when: 
          - inventory_hostname in groups['catalyst_2960x']
          # Only run the copy if the specific flash drive is missing the file
          # AND the flash drive actually exists (which bypasses errors on smaller stacks)
          - item.failed